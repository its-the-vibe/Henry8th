name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build
        run: make build
      - name: Test
        run: make test
      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
